<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pipe Shifter: 물길을 열어라!</title>
    <!-- 폰트: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 배경 파티클용 캔버스 -->
        <canvas id="bg-canvas"></canvas>

        <header>
            <div class="logo">
                <span class="highlight">PIPE</span> SHIFTER
            </div>
            <div class="top-controls">
                <button id="auto-solve-btn" class="icon-btn" style="color: #ffd700; border-color: #ffd700;" title="정답 보기 (임시)">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </button>
                <div class="stage-info">Stage <span id="stage-display">1</span></div>
                <button id="reset-btn" class="icon-btn" title="스테이지 재시작">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
        </header>

        <main>
            <div class="game-container">
                <!-- 게임 보드 렌더링 영역 -->
                <div id="grid-board" class="grid-board"></div>
                
                <!-- 조작 UI 오버레이 -->
                <div id="action-overlay" class="action-overlay hidden">
                    <button class="action-btn rotate-left" data-action="rotate-left" title="왼쪽으로 90도 회전">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                    <button class="action-btn rotate-right" data-action="rotate-right" title="오른쪽으로 90도 회전">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    </button>
                    <button class="action-btn flip" data-action="flip" title="뒤집기">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M8 3v18"/><path d="M16 3v18"/><path d="M12 8l4 4-4 4"/><path d="M4 12h8"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <div class="stars-container">
                <div class="star empty" id="star-1">★</div>
                <div class="star empty" id="star-2">★</div>
                <div class="star empty" id="star-3">★</div>
            </div>
            <div class="moves-info">Moves: <span id="moves-display">0</span></div>
            <button id="check-flow-btn" class="primary-btn">밸브 열기</button>
        </footer>

        <!-- 클리어 모달 -->
        <div id="clear-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h2 class="modal-title">STAGE CLEAR!</h2>
                <div class="modal-stars">
                    <div class="star active">★</div>
                    <div class="star active">★</div>
                    <div class="star active">★</div>
                </div>
                <p class="modal-msg">완벽하게 물길을 열었어요!</p>
                <button id="next-stage-btn" class="primary-btn">다음 스테이지</button>
            </div>
        </div>
    </div>
    
    <script src="levels.js"></script>
    <script src="game.js"></script>
</body>
</html>
